<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>لوحة التحكم - مصرف الامان</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
    
    :root {
      --green-dark: #1a5f3c;
      --green-light: #2d8a5e;
      --green-border: #4db87a;
      --orange: #e67e22;
      --red: #e74c3c;
      --bg: #f5f7fa;
      --card-bg: #ffffff;
      --text: #2c3e50;
      --text-light: #7f8c8d;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    
    /* LOGIN SCREEN */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-light) 100%);
    }
    
    .login-box {
      background: var(--card-bg);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    
    .login-box h1 {
      color: var(--green-dark);
      margin-bottom: 10px;
      font-size: 28px;
    }
    
    .login-box p {
      color: var(--text-light);
      margin-bottom: 30px;
    }
    
    .login-box input {
      width: 100%;
      padding: 15px;
      margin-bottom: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      font-family: inherit;
      transition: border-color 0.3s;
    }
    
    .login-box input:focus {
      outline: none;
      border-color: var(--green-border);
    }
    
    .login-box button {
      width: 100%;
      padding: 15px;
      background: var(--green-dark);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.3s;
    }
    
    .login-box button:hover {
      background: var(--green-light);
    }
    
    .error-msg {
      color: var(--red);
      margin-top: 10px;
      font-size: 14px;
    }
    
    /* DASHBOARD */
    .dashboard {
      display: none;
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid #e0e0e0;
    }
    
    .dashboard-header h1 {
      color: var(--green-dark);
      font-size: 28px;
    }
    
    .logout-btn {
      padding: 10px 20px;
      background: var(--red);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    
    /* STATS CARDS */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: var(--card-bg);
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      text-align: center;
    }
    
    .stat-card h3 {
      color: var(--text-light);
      font-size: 14px;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    
    .stat-value {
      font-size: 36px;
      font-weight: 700;
      color: var(--green-dark);
    }
    
    /* DATA TABLE */
    .data-section {
      background: var(--card-bg);
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }
    
    .data-section h2 {
      color: var(--green-dark);
      margin-bottom: 20px;
      font-size: 20px;
    }
    
    .data-table {
      width: 100%;
      border-collapse: collapse;
    }
    
    .data-table th,
    .data-table td {
      padding: 12px;
      text-align: right;
      border-bottom: 1px solid #e0e0e0;
    }
    
    .data-table th {
      background: var(--bg);
      color: var(--green-dark);
      font-weight: 700;
    }
    
    .data-table tr:hover {
      background: #f9f9f9;
    }
    
    .no-data {
      text-align: center;
      padding: 40px;
      color: var(--text-light);
    }
    
    /* LOADING */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e0e0e0;
      border-top-color: var(--green-dark);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- LOGIN SCREEN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <h1>🔐 لوحة التحكم</h1>
      <p>مصرف الامان - نظام الإدارة</p>
      <input type="text" id="username" placeholder="اسم المستخدم" />
      <input type="password" id="password" placeholder="كلمة المرور" />
      <button onclick="login()">تسجيل الدخول</button>
      <div class="error-msg" id="loginError"></div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <div class="dashboard-header">
      <h1>📊 لوحة التحكم - مصرف الامان</h1>
      <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
    </div>
    
    <div class="stats-grid">
      <div class="stat-card">
        <h3>إجمالي الزوار</h3>
        <div class="stat-value" id="totalVisitors">0</div>
      </div>
      <div class="stat-card">
        <h3>الزوار اليوم</h3>
        <div class="stat-value" id="todayVisitors">0</div>
      </div>
      <div class="stat-card">
        <h3>الرسائل</h3>
        <div class="stat-value" id="totalMessages">0</div>
      </div>
    </div>
    
    <div class="data-section">
      <h2>📋 بيانات الزوار</h2>
      <div id="visitorsTable">
        <div class="loading">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAfKhdBfFZBx7VRnBFV9EUCCrigFKIBXd8",
      authDomain: "amnbnk-new.firebaseapp.com",
      databaseURL: "https://amnbnk-new-default-rtdb.firebaseio.com",
      projectId: "amnbnk-new",
      storageBucket: "amnbnk-new.firebasestorage.app",
      messagingSenderId: "968970004871",
      appId: "1:968970004871:web:0646198bd6c861bc8b0b22",
      measurementId: "G-FWWV8ZEL5H"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Make db available globally for the login functions
    window.firebaseDB = db;
    window.firebaseRef = ref;
    window.firebaseOnValue = onValue;
    window.firebaseGet = get;
  </script>

  <script>
    // Admin credentials
    const ADMIN_USER = 'admin';
    const ADMIN_PASS = 'admin123';

    function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('loginError');

      if (username === ADMIN_USER && password === ADMIN_PASS) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadDashboardData();
      } else {
        errorDiv.textContent = 'بيانات غير صحيحة';
      }
    }

    function logout() {
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      document.getElementById('loginError').textContent = '';
    }

    function loadDashboardData() {
      const db = window.firebaseDB;
      const ref = window.firebaseRef;
      const onValue = window.firebaseOnValue;

      if (!db) {
        console.error('Firebase not initialized');
        return;
      }

      // Load visitors count
      const visitorsRef = ref(db, 'visitors');
      onValue(visitorsRef, (snapshot) => {
        const data = snapshot.val();
        let total = 0;
        let today = 0;
        const todayStr = new Date().toISOString().split('T')[0];

        if (data) {
          Object.values(data).forEach(visitor => {
            total++;
            if (visitor.date === todayStr) today++;
          });
        }

        document.getElementById('totalVisitors').textContent = total;
        document.getElementById('todayVisitors').textContent = today;
        renderVisitorsTable(data);
      });

      // Load messages count
      const messagesRef = ref(db, 'messages');
      onValue(messagesRef, (snapshot) => {
        const data = snapshot.val();
        document.getElementById('totalMessages').textContent = data ? Object.keys(data).length : 0;
      });
    }

    function renderVisitorsTable(data) {
      const container = document.getElementById('visitorsTable');
      
      if (!data || Object.keys(data).length === 0) {
        container.innerHTML = '<div class="no-data">لا توجد بيانات زوار حالياً</div>';
        return;
      }

      const visitors = Object.entries(data).map(([id, v]) => ({ id, ...v }));
      visitors.sort((a, b) => new Date(b.timestamp || 0) - new Date(a.timestamp || 0));

      let html = '<table class="data-table"><thead><tr>';
      html += '<th>التاريخ</th><th>الوقت</th><th>الجهاز</th><th>المتصفح</th><th>IP</th>';
      html += '</tr></thead><tbody>';

      visitors.slice(0, 50).forEach(v => {
        const date = v.date || '-';
        const time = v.time || '-';
        const device = v.device || 'غير معروف';
        const browser = v.browser || 'غير معروف';
        const ip = v.ip || '-';
        html += '<tr><td>' + date + '</td><td>' + time + '</td><td>' + device + '</td><td>' + browser + '</td><td>' + ip + '</td></tr>';
      });

      html += '</tbody></table>';
      container.innerHTML = html;
    }
  </script>
</body>
</html>
